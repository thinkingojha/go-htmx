{{ define "base" }}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal portfolio and blog of Ankush Ojha - Backend & AI Platform Engineer">
    <meta name="keywords" content="software engineer, golang, llm, backend, ai, portfolio">
    <meta name="author" content="Ankush Ojha">

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.8"></script>

    <!-- Favicon -->
    <link rel="icon" href="/static/icons/icon2.png" type="image/x-icon"/>

    <title>{{ if .Title }}{{ .Title }} — ankush.fyi{{ else }}ankush.fyi{{ end }}</title>

    <style>
        :root {
            --font-display: 'Playfair Display', Georgia, serif;
            --font-ui: 'Space Grotesk', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --color-text: #1a1a1a;
            --color-muted: #888888;
            --color-border: #e5e5e5;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            background-color: #ffffff !important;
        }

        body {
            font-family: var(--font-body);
            background-color: #ffffff !important;
            color: var(--color-text);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.25s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="min-h-screen flex flex-col max-w-2xl mx-auto px-6 lg:px-8">
        {{ template "header" . }}

        <main class="flex-grow fade-in">
            {{ block "content" . }}
                <p style="color: #888; margin-top: 2rem;">Something went wrong. Please refresh.</p>
            {{ end }}
        </main>

        {{ template "footer" . }}
    </div>

    <script>
        htmx.config.globalViewTransitions = true;

        document.body.addEventListener('htmx:afterSwap', function(evt) {
            evt.detail.target.classList.add('fade-in');
        });
    </script>
</body>
</html>
{{ end }}
