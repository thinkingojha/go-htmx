{{ define "header" }}
<header style="
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background-color: #ffffff;
    border-bottom: 1px solid #f0f0f0;
    padding: 20px 0;
    z-index: 100;
">
    <div style="max-width: 42rem; margin: 0 auto; padding: 0 2rem;">
        <a href="/" style="text-decoration: none;">
            <span style="
                font-family: 'Space Grotesk', system-ui, sans-serif;
                font-size: 16px;
                font-weight: 500;
                letter-spacing: 0.12em;
                color: #1a1a1a;
            ">ankush.fyi{{ if and .PageName (ne .PageName "home") }} &mdash; {{ .PageName }}{{ end }}</span>
        </a>
    </div>
</header>

<!-- Spacer so content doesn't slide under fixed header -->
<div style="height: 60px;"></div>
{{ end }}
