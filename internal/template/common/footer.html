{{ define "footer"}}
<footer style="
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: #ffffff;
    border-top: 1px solid #f0f0f0;
    padding: 12px 0;
    z-index: 100;
">
    <nav style="
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
        max-width: 42rem;
        margin: 0 auto;
        padding: 0 2rem;
    ">
        {{ if ne .PageName "home" }}
        <a href="/" style="
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
        ">home</a>
        {{ end }}
        {{ if ne .PageName "about" }}
        <a href="/about" style="
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
        ">about</a>
        {{ end }}
        {{ if ne .PageName "writings" }}
        <a href="/writings" style="
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
        ">writings</a>
        {{ end }}
        {{ if ne .PageName "products" }}
        <a href="/products" style="
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
        ">products</a>
        {{ end }}
        {{ if ne .PageName "contact" }}
        <a href="/contact" style="
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
        ">contact</a>
        {{ end }}
    </nav>
</footer>

<!-- Spacer so content doesn't get hidden behind the fixed footer -->
<div style="height: 52px;"></div>
{{ end }}
